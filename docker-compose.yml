services:
  aloclinica-web:
    build:
      context: .
      dockerfile: Dockerfile.ci
    image: aloclinica-web:latest
    container_name: aloclinica-web
    restart: unless-stopped
    networks:
      - easypanel
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  easypanel:
    external: true

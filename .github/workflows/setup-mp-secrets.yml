name: One-shot — configurar Mercado Pago no Supabase

# Roda manualmente uma vez via workflow_dispatch. Aplica as migrations MP e
# seta os secrets nas Edge Functions. Pode ser deletado depois.

on:
  workflow_dispatch:
    inputs:
      mp_access_token:
        description: "Mercado Pago Access Token (APP_USR-...)"
        required: true
        type: string
      mp_webhook_secret:
        description: "Mercado Pago Webhook Secret (assinatura)"
        required: true
        type: string
      app_url:
        description: "URL pública da aplicação"
        required: false
        type: string
        default: "https://aloclinica.com.br"

env:
  SUPABASE_PROJECT_REF: pwxvvimdtmvziynbspgx

jobs:
  setup:
    name: Sync secrets + migrations
    runs-on: ubuntu-latest
    steps:
      - name: Mask inputs
        run: |
          echo "::add-mask::${{ inputs.mp_access_token }}"
          echo "::add-mask::${{ inputs.mp_webhook_secret }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Aplicar migrations Mercado Pago via Management API
        run: |
          set -e
          for f in supabase/migrations/20260512_mercadopago_migration.sql supabase/migrations/20260512b_mercadopago_cleanup.sql; do
            echo "→ Aplicando $f"
            python3 - <<PYEOF
          import json, urllib.request
          with open("$f", "r", encoding="utf-8") as fp:
              sql = fp.read()
          req = urllib.request.Request(
              f"https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query",
              data=json.dumps({"query": sql}).encode("utf-8"),
              headers={
                  "Authorization": "Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              resp = urllib.request.urlopen(req, timeout=120)
              print(f"  OK ({resp.status})")
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"  HTTP {e.code}: {body[:400]}")
              raise SystemExit(1)
          PYEOF
          done
        env:
          SUPABASE_PROJECT_REF: ${{ env.SUPABASE_PROJECT_REF }}

      - name: Setar secrets nas Edge Functions
        run: |
          python3 - <<PYEOF
          import json, urllib.request
          payload = [
              {"name": "MERCADOPAGO_ACCESS_TOKEN", "value": "${{ inputs.mp_access_token }}"},
              {"name": "MERCADOPAGO_WEBHOOK_SECRET", "value": "${{ inputs.mp_webhook_secret }}"},
              {"name": "APP_URL", "value": "${{ inputs.app_url }}"},
          ]
          req = urllib.request.Request(
              f"https://api.supabase.com/v1/projects/${{ env.SUPABASE_PROJECT_REF }}/secrets",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": "Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              resp = urllib.request.urlopen(req, timeout=60)
              print(f"Secrets set: HTTP {resp.status}")
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"HTTP {e.code}: {body[:400]}")
              raise SystemExit(1)
          PYEOF

      - name: Summary
        run: |
          echo "## ✅ Setup Mercado Pago concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Migrations aplicadas: 20260512_mercadopago_migration.sql, 20260512b_mercadopago_cleanup.sql" >> $GITHUB_STEP_SUMMARY
          echo "- Edge Function Secrets configurados: MERCADOPAGO_ACCESS_TOKEN, MERCADOPAGO_WEBHOOK_SECRET, APP_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Próximo: trigger deploy normal (push em main) pra build do frontend pegar VITE_MERCADOPAGO_PUBLIC_KEY." >> $GITHUB_STEP_SUMMARY
